services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "17789:17789"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:17789
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${DB_USER:-xhs_pilot}:${DB_PASSWORD:-change-me}@postgres:${DB_PORT:-5432}/${DB_NAME:-xhs_pilot}
      NODE_ENV: production
    volumes:
      - ./uploads:/app/uploads
    restart: always

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -lc "./scripts/with-env.sh node-pg-migrate up && exec npm run worker:start"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:17789
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${DB_USER:-xhs_pilot}:${DB_PASSWORD:-change-me}@postgres:${DB_PORT:-5432}/${DB_NAME:-xhs_pilot}
      NODE_ENV: production
    volumes:
      - ./uploads:/app/uploads
    restart: always

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-xhs_pilot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: ${DB_NAME:-xhs_pilot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-xhs_pilot} -d ${DB_NAME:-xhs_pilot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pgdata:
  redisdata:
  uploads:
