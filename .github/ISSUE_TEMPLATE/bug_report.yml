name: Bug report
description: 报告一个可以复现的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量把问题写到可复现、可验证的程度。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 用 1-3 句话说明出了什么问题
      placeholder: 在创作工作台点击生成后，任务一直停留在 pending，没有进入 running。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按顺序列出最短复现路径
      placeholder: |
        1. 使用 docker compose 启动
        2. 进入 /create
        3. 输入主题并点击生成
        4. 观察任务状态
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
      placeholder: 任务应进入 running，并返回策略和生成结果。
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: 任务一直是 pending，页面没有报错，但 worker 日志有连接失败信息。
    validations:
      required: true
  - type: dropdown
    id: deploy_mode
    attributes:
      label: 部署方式
      options:
        - Docker Compose
        - 本地开发模式
        - 其他
    validations:
      required: true
  - type: input
    id: storage_provider
    attributes:
      label: STORAGE_PROVIDER
      description: 当前官方只支持 local
      placeholder: local
  - type: input
    id: llm_provider
    attributes:
      label: LLM / Embedding 提供方
      description: 例如 OpenAI / Ollama / DeepSeek / OpenAI-compatible proxy
      placeholder: Ollama + text-embedding-3-small proxy
  - type: textarea
    id: logs
    attributes:
      label: 相关日志或报错
      description: 可粘贴 `docker compose logs`、浏览器报错或服务端异常
      render: shell
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 截图、相关配置、是否可稳定复现等
