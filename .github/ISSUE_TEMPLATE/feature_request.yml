name: Feature request
description: 提交一个功能想法或产品改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        请先说明你的真实使用场景，再描述方案。这样更容易判断它是否适合当前产品边界，还是应该进入 roadmap。
  - type: textarea
    id: use_case
    attributes:
      label: 使用场景
      description: 你想解决什么问题，谁会用，为什么现在做
      placeholder: 我想在自托管部署时更方便地接入 Ollama，不需要手动处理容器到宿主机的访问。
    validations:
      required: true
  - type: textarea
    id: current_pain
    attributes:
      label: 当前痛点
      description: 现在的行为为什么不够用
      placeholder: README 已说明用法，但新用户仍容易在 base URL 上踩坑。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望系统如何工作
      placeholder: 在 README 和 compose 默认配置里进一步收口，或者增加一节故障排查说明。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 可选，说明你是否尝试过其他做法
  - type: checkboxes
    id: boundaries
    attributes:
      label: 边界确认
      options:
        - label: 我知道当前官方支持范围是单用户、自托管、Docker Compose、local storage
          required: true
        - label: 如果这个能力超出当前边界，我接受它先进入 roadmap
          required: true
